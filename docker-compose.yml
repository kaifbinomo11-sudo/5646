version: "3.9"

services:
  bot:
    build: .
    image: netflix-cookie-checker-bot
    container_name: netflix_bot
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - bot_data:/data

    ports:
      - "5000:5000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot_data:
    driver: local
